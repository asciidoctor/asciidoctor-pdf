name: Report a bug or security vulnerability
description: >-
  Report a bug or security vulnerability in Asciidoctor PDF.
  Note that usage questions are not considered bugs.
  Please direct those questions to the project chat (see link below).
labels: [bug]
body:
- type: markdown
  attributes:
    value: >-
      Before reporting a bug, please verify that you're using the latest patch release (refer to the CHANGELOG) and have fulfilled the prerequisites as stated in the README.
      If not, please upgrade and retest your scenario first.
      Usage questions are not considered bugs and should instead be directed to the \#asciidoctor-pdf channel in the [project chat](https://chat.asciidoctor.org).
- type: input
  id: version
  attributes:
    label: Asciidoctor version
    description: Run `asciidoctor-pdf -v` to find the version of Asciidoctor and Ruby you're using.
    placeholder: "e.g., Asciidoctor PDF 2.3.24 using Asciidoctor 2.0.26 [https://asciidoctor.org]"
  validations:
    required: true
- type: textarea
  id: description
  attributes:
    label: Description
    description: A clear and concise description of the bug.
  validations:
    required: true
- type: textarea
  id: reproducer
  attributes:
    label: Sample document
    description: Provide a minimal AsciiDoc document that reproduces the problem.
    render: asciidoc
  validations:
    required: true
- type: textarea
  id: expected
  attributes:
    label: Expected behavior
    description: What did you expect to happen?
  validations:
    required: true
- type: textarea
  id: actual
  attributes:
    label: Actual behavior
    description: What actually happened? Include any error messages or unexpected output.
  validations:
    required: true
